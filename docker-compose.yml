services:
  web:
    container_name: zenlist-backend
    build: .
    ports:
      - "8126:5000"
    environment:
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/serviceAccountKey.json
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=bayit
    volumes:
      - ../zenlist_databases:/app/databases
      - ../zenlist_receipts:/app/receipts
      - ../zenlist_original_receipts_backup:/app/original_receipts_backup
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    command: python app.py
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - zenlist-network

  mongo:
    image: mongo:7
    container_name: bayit-mongo
    restart: always
    ports:
      - "27017:27017"   # expose to host for local development / Compass
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zenlist-network

volumes:
  mongo_data:

networks:
  zenlist-network:
    driver: bridge